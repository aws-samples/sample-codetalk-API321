AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: re:Invent Demo 1 to analyze wind speed

Parameters:
  DemoNumber:
    Type: String
    Description: Provide a demo number
    Default: demo1

Globals:
  Function:
    CodeUri: functions/wind-analysis/
    Runtime: python3.13
    Timeout: 120
    Architectures:
      - arm64

Resources:
  # Resourcs for the state machine that copies data from the public noaa bucket

  NOAADataBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  CopyS3DataApplicationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              AWS: !Ref "AWS::AccountId"
              Service:
                - states.amazonaws.com
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: CopyS3DataPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - S3:ListBucket
                  - S3:GetObject
                Resource:
                  - arn:aws:s3:::noaa-gsod-pds
                  - arn:aws:s3:::noaa-gsod-pds/*
              - Effect: Allow
                Action:
                  - S3:PutObject
                Resource: !Join ["/", [!GetAtt NOAADataBucket.Arn, "*"]]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchFullAccess
        - arn:aws:iam::aws:policy/AWSStepFunctionsFullAccess

  CopyNOAAS3DataStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: CopyNOAAS3DataStateMachine
      DefinitionUri: statemachines/copy-noaa-data-us-east-1.asl.json
      DefinitionSubstitutions:
        DestinationBucket: !Ref NOAADataBucket
      Role: !GetAtt CopyS3DataApplicationRole.Arn

  # Resources for the NOAA data state machine

  ResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  ResultsDynamoDBTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: pk
        Type: String
                
  
  WindSpeedStateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              AWS: !Ref "AWS::AccountId"
              Service:
                - states.amazonaws.com
            Action:
              - "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchFullAccess
        - arn:aws:iam::aws:policy/AWSXrayFullAccess
      Policies:
        - PolicyName: ReadDataPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - S3:GetObject
                  - S3:ListBucket
                Resource:
                  - !GetAtt NOAADataBucket.Arn
                  - !Join ["/", [!GetAtt NOAADataBucket.Arn, "*"]]
        - PolicyName: WriteResultsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - S3:PutObject
                Resource: !Join ["/", [!GetAtt ResultsBucket.Arn, "*"]]
        - PolicyName: StartExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - states:StartExecution
                Resource: 
                  - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${DemoNumber}-windspeed-statemachine"
                  - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${DemoNumber}-windspeed-longwait-statemachine"       
        - PolicyName: InvokeMapperReducerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt WindSpeedFunction.Arn
                  - !GetAtt ReducerFunction.Arn
                  - !GetAtt ConvertWindSpeedFunction.Arn

  WindSpeedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${DemoNumber}-analysis-windspeed"
      Handler: app.lambda_handler
      MemorySize: 2048
      Environment:
        Variables:
          INPUT_BUCKET_NAME: !Ref NOAADataBucket
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref NOAADataBucket

  ConvertWindSpeedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${DemoNumber}-convert-windspeed
      Handler: windspeed.lambda_handler
      MemorySize: 1024

  ReducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${DemoNumber}-reducer-windspeed
      Handler: app.reducer_handler
      MemorySize: 2048
      Environment:
        Variables:
          RESULTS_BUCKET_NAME: !Ref ResultsBucket
          RESULTS_DYNAMODB_TABLE_NAME: !Ref ResultsDynamoDBTable
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ResultsBucket
        - DynamoDBWritePolicy:
            TableName: !Ref ResultsDynamoDBTable

  NOAAWeatherLogGroup:
    Type: AWS::Logs::LogGroup

  NOAAWindSpeedStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub ${DemoNumber}-windspeed-statemachine
      DefinitionUri: statemachines/dmap-windspeed.asl.json
      DefinitionSubstitutions:
        DistributedMapTestFunctionName: !GetAtt WindSpeedFunction.Arn
        ConvertWindSpeedFunctionName: !GetAtt ConvertWindSpeedFunction.Arn
        ReducerFunctionName: !GetAtt ReducerFunction.Arn
        InputBucket: !Ref NOAADataBucket
        ResultsBucket: !Ref ResultsBucket
      Role: !GetAtt WindSpeedStateMachineRole.Arn
      Logging:
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt NOAAWeatherLogGroup.Arn
        IncludeExecutionData: TRUE
        Level: "ERROR"

  NOAAWindSpeedLongWaitStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub ${DemoNumber}-windspeed-longwait-statemachine
      DefinitionUri: statemachines/windspeed-longwait.asl.json
      DefinitionSubstitutions:
        DistributedMapTestFunctionName: !GetAtt WindSpeedFunction.Arn
        ConvertWindSpeedFunctionName: !GetAtt ConvertWindSpeedFunction.Arn
        ReducerFunctionName: !GetAtt ReducerFunction.Arn
        InputBucket: !Ref NOAADataBucket
        ResultsBucket: !Ref ResultsBucket
      Role: !GetAtt WindSpeedStateMachineRole.Arn

  # Delete S3 objects resource
  DeleteS3DataApplicationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              AWS: !Ref "AWS::AccountId"
              Service:
                - states.amazonaws.com
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: ListS3BucketPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - S3:ListBucket
                Resource:
                  - !GetAtt NOAADataBucket.Arn
                  - !GetAtt ResultsBucket.Arn
        - PolicyName: InvokeFunctionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt DeleteS3ObjectTransformFunction.Arn
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchFullAccess
        - arn:aws:iam::aws:policy/AWSStepFunctionsFullAccess

  DeleteS3ObjectTransformFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: cleanup.handler
      MemorySize: 512
      Timeout: 10
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ResultsBucket
        - S3CrudPolicy:
            BucketName: !Ref NOAADataBucket

  DeleteNOAADataStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: DeleteNOAADataStateMachine
      DefinitionUri: statemachines/delete-s3-data.asl.json
      DefinitionSubstitutions:
        TransformFunction: !GetAtt DeleteS3ObjectTransformFunction.Arn
      Role: !GetAtt DeleteS3DataApplicationRole.Arn

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartStepFunctionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - states:StartExecution
                Resource: !Ref NOAAWindSpeedStateMachine

  WindSpeedSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${DemoNumber}-windspeed-schedule"
      Description: "Triggers NOAAWindSpeedStateMachine every 5 minutes"
      ScheduleExpression: "rate(5 minutes)"
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !Ref NOAAWindSpeedStateMachine
        RoleArn: !GetAtt SchedulerRole.Arn
        Input: '{}'

  NOAAWindSpeedDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${DemoNumber}-windspeed-dashboard"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 7,
              "properties": {
                "metrics": [
                  [ "AWS/States", "ExecutionsSucceeded", "StateMachineArn", "${NOAAWindSpeedStateMachine}" ],
                  [ ".", "ExecutionThrottled", ".", "." ],
                  [ ".", "ExecutionsStarted", ".", "." ],
                  [ ".", "ExecutionTime", ".", ".", { "stat": "Average" } ]
                ],
                "view": "singleValue",
                "stacked": false,
                "region": "${AWS::Region}",
                "period": 60,
                "stat": "Sum",
                "title": "State Machine Execution Metrics"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 7,
              "properties": {
                "metrics": [
                  [ "AWS/States", "ApproximateOpenMapRunCount", { "region": "${AWS::Region}" } ],
                  [ ".", "OpenMapRunLimit", { "region": "${AWS::Region}" } ],
                  [ ".", "ApproximateMapRunBacklogSize", { "region": "${AWS::Region}" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "stat": "Maximum",
                "period": 60,
                "title": "Map Run Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 7,
              "width": 24,
              "height": 7,
              "properties": {
                "metrics": [
                  [ "AWS/States", "ProvisionedBucketSize", "ServiceMetric", "StateTransition", { "region": "${AWS::Region}" } ],
                  [ ".", "ProvisionedRefillRate", ".", ".", { "region": "${AWS::Region}" } ],
                  [ ".", "ConsumedCapacity", ".", ".", { "region": "${AWS::Region}", "stat": "Sum" } ],
                  [ ".", "ThrottledEvents", ".", ".", { "region": "${AWS::Region}", "stat": "Sum" } ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "stat": "Maximum",
                "period": 60,
                "title": "State Transition Quota Metrics"
              }
            }
          ]
        }

Outputs:
  StateMachineLogGroupName:
    Description: CloudWatch log group name for the distirbuted map state machine
    Value: !Ref NOAAWeatherLogGroup
  DynamoDBTableName:
    Description: DynamoDB table name where final results are written
    Value: !Ref ResultsDynamoDBTable
  NOAADataBucket:
    Description: Bucket where the NOAA data will be copied, and where the analysis will read
    Value: !Ref NOAADataBucket
  StateMachineResultsBucket:
    Description: Bucket where the distributed map run will write results
    Value: !Ref ResultsBucket
  DashboardName:
    Description: CloudWatch dashboard for monitoring Step Functions metrics
    Value: !Ref NOAAWindSpeedDashboard

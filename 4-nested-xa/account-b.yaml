AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: re:Invent Demo 4 - nested cross account (Account B)

Parameters:
  DemoNumber:
    Type: String
    Description: Provide a demo number
    Default: demo4
  AccountANumber:
    Type: String
    Description: Account A number for cross-account access
  AccountBNumber:
    Type: String
    Description: Account B number for state machine resources

Resources:
  ChildStateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: TrustPolicy1
            Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                "aws:SourceAccount": !Ref AccountBNumber
              ArnLike:
                "aws:SourceArn": !Sub "arn:aws:states:${AWS::Region}:${AccountBNumber}:stateMachine:*"
      Policies:
        - PolicyName: StepFunctionsExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "states:StartExecution"
                Resource:
                  - !Sub "arn:aws:states:${AWS::Region}:${AccountBNumber}:stateMachine:nested-process-review*"
              - Effect: Allow
                Sid: InvokeModel1
                Action:
                  - "bedrock:InvokeModel"
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-micro-v1:0"

  ChildStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub ${DemoNumber}-nested-process-review
      DefinitionUri: statemachines/account-b-statemachine.asl.json
      Role: !GetAtt ChildStateMachineRole.Arn
